<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Login</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .login-box {
    background: white;
    padding: 30px;
    width: 280px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
    text-align: center;
  }
  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #0f2a5c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="login-box">
  <h3>Employee Portal</h3>

  <input id="empNo" placeholder="Employee Number">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzrYCRZR39YfLi8sWqfntPtP1pi5sCS94OqfU5Jl-Tt-lBUUiZxkn02bgnJeVBq1vxF/exec";

function login() {
  const empNo = document.getElementById("empNo").value.trim();
  const password = document.getElementById("password").value.trim();

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      employee_no: empNo,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log("SERVER RESPONSE:", data);

    if (data.success) {
      localStorage.setItem("loggedIn", "YES");
      localStorage.setItem("empNo", empNo);
      localStorage.setItem("empName", data.name);
      window.location.href = "index.html";
    } else {
      alert("Invalid Employee Number or Password");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Server error. Please try again.");
  });
}
</script>

</body>
</html>
