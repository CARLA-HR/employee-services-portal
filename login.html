<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Login</title>
</head>

<body style="font-family:Arial;text-align:center;padding:40px">

<h2>Employee Portal Login</h2>

<input id="empNo" placeholder="Employee Number"
       style="padding:10px;width:220px"><br><br>

<input id="password" type="password" placeholder="Password"
       style="padding:10px;width:220px"><br><br>

<button onclick="login()">Login</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzV2kMnaA2ZQefixToQUDW8wxkJmEk56qkOd7mrkD4OjnwBJ1IHSe1EPTJ_JAKHlt_B/exec";

function login() {
  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      employee_no: empNo.value.trim(),
      password: password.value.trim()
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      // ✅ STORE SESSION
      localStorage.setItem("loggedIn", "YES");
      localStorage.setItem("empNo", empNo.value);
      localStorage.setItem("empName", data.name);

      // ✅ FORCE REDIRECT
      window.location.replace("index.html");
    } else {
      alert("Invalid Employee Number or Password");
    }
  })
  .catch(err => {
    alert("Server error. Please try again.");
    console.error(err);
  });
}
</script>
</body>
</html>
