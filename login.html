<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Login</title>
</head>

<body style="font-family:Arial;text-align:center;padding:40px">

<h2>Employee Portal Login</h2>

<input id="empNo" placeholder="Employee Number"
       style="padding:10px;width:220px"><br><br>

<input id="password" type="password" placeholder="Password"
       style="padding:10px;width:220px"><br><br>

<button onclick="login()">Login</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzrYCRZR39YfLi8sWqfntPtP1pi5sCS94OqfU5Jl-Tt-lBUUiZxkn02bgnJeVBq1vxF/exec";

function login() {
  console.log("LOGIN BUTTON CLICKED");

  const empNo = document.getElementById("empNo").value.trim();
  const password = document.getElementById("password").value.trim();

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      employee_no: empNo,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log("SERVER RESPONSE:", data);

    if (data.success) {
      // ✅ SAVE SESSION
      localStorage.setItem("loggedIn", "YES");
      localStorage.setItem("empNo", empNo);
      localStorage.setItem("empName", data.name);

      // ✅ REDIRECT
      window.location.replace("index.html");
    } else {
      alert("Invalid Employee Number or Password");
    }
  })
  .catch(err => {
    console.error("FETCH ERROR:", err);
    alert("Server error. Please try again.");
  });
}
</script>
</body>
</html>
